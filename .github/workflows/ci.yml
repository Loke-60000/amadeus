name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AMADEUS_SKIP_NATIVE_CUBISM: "1"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libasound2-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --no-default-features -p amadeus-backend -p amadeus-client -p amadeus-desktop

  android-debug:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.3.11579264"
      BUILD_TOOLS_VERSION: "35.0.0"
      COMPILE_SDK: "35"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and build tools
        run: |
          sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS_VERSION }}" \
            "platforms;android-${{ env.COMPILE_SDK }}"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> android/local.properties

      - name: Override cargo NDK linker paths for CI
        run: |
          NDK_TC="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          cat >> .cargo/config.toml <<EOF

          [target.aarch64-linux-android]
          linker = "$NDK_TC/aarch64-linux-android26-clang"
          ar     = "$NDK_TC/llvm-ar"

          [target.x86_64-linux-android]
          linker = "$NDK_TC/x86_64-linux-android26-clang"
          ar     = "$NDK_TC/llvm-ar"
          EOF

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
